site_name: Portal Custo Defeito
site_description: Ferramenta executiva do Time de Qualidade da Vertical de Procuradorias para análise do impacto financeiro de defeitos de software
site_url: https://custo-defeito.softplan.com.br/

repo_name: softplan/portal-custo-defeito
repo_url: https://gitlab.com/softplan/justica/procuradorias/arquitetura-de-software/tools/portal-custo-defeito
edit_uri: -/edit/main/docs/

nav:
  - Home: index.md
  - Arquitetura:
    - Visão Geral: architecture/overview.md
    - Componentes: architecture/components.md
    - Fluxo de Dados: architecture/data-flow.md
  - Desenvolvimento:
    - Guia de Início: development/getting-started.md
    - Estrutura do Projeto: development/project-structure.md
    - Padrões de Código: development/coding-standards.md
    - Testes: development/testing.md
  - Contribuição:
    - Como Contribuir: contributing.md
    - InnerSource: innersource.md

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/softplan/justica/procuradorias/arquitetura-de-software/tools/portal-custo-defeito
  version:
    provider: mike
